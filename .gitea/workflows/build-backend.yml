name: Build and Push Backend Image

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Gitea Registry
        uses: docker/login-action@v2
        with:
          registry: gitea.mohandl3g.ddnsgeek.com
          username: ${{ gitea.actor }}
          password: ${{ secrets.GITEA_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: |
            gitea.mohandl3g.ddnsgeek.com/mohandl3g/pc-achievements-backend:latest
            gitea.mohandl3g.ddnsgeek.com/mohandl3g/pc-achievements-backend:${{ github.sha }}
