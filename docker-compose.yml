services:
  backend:
    build: ./backend
    container_name: pc-achievements-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend/achievements.db:/usr/src/app/achievements.db
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    image: nginx:latest
    container_name: pc-achievements-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "480:80"
    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - backend
    restart: unless-stopped
