name: pc-achievements
services:
  app:
    image: mohandl3g/pc-achievements:latest
    container_name: pc-achievements
    ports:
      - "480:5000"
    volumes:
      - C:\Data\AppData\ach\backend:/database
    environment:
      - DATABASE_PATH=/database/achievements.db
      - STEAM_API_KEY=***REMOVED***
      - STEAM_USER_ID=***REMOVED***
      - JWT_SECRET=***REMOVED***
      - ADMIN_USERNAME=***REMOVED***
      - ADMIN_PASSWORD=***REMOVED***
    restart: unless-stopped
